name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ── 1. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install textual websockets numpy

      - name: Run test suite
        run: python -m unittest discover -s tests -v

  # ── 2. Build Windows .exe ─────────────────────────────────────────────────
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install textual websockets sounddevice numpy pyinstaller

      - name: Build executable
        run: pyinstaller traxus.spec

      - name: Rename artifact with version
        shell: bash
        run: mv dist/traxus.exe "dist/traxus-${{ github.ref_name }}-windows.exe"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: traxus-windows
          path: dist/traxus-${{ github.ref_name }}-windows.exe
          if-no-files-found: error

  # ── 3. Publish GitHub Release ─────────────────────────────────────────────
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [test, build-windows]
    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: traxus-windows
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/traxus-${{ github.ref_name }}-windows.exe
          generate_release_notes: true
          body: |
            ## Traxus ${{ github.ref_name }}

            ### Download
            | Platform | File |
            |----------|------|
            | Windows (64-bit) | `traxus-${{ github.ref_name }}-windows.exe` |

            ### Requirements
            - No Python installation needed — the `.exe` is self-contained.
            - **Run from Windows Terminal or PowerShell** (not by double-clicking
              from Explorer). See [deploy/windows-build-warnings.md](deploy/windows-build-warnings.md)
              for details.

            ### Connecting
            Launch the app, enter your server URL (e.g. `wss://yourname.duckdns.org`)
            and a username to connect.
